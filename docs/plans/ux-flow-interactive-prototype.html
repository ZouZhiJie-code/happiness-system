<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>记录链路 · 可交互原型</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#2a1d10;--ink-soft:#5a4633;--ink-faint:#8a715a;
    --paper-card:#fffaf0;--line:rgba(110,73,38,.16);--line-2:rgba(110,73,38,.3);
    --amber:#b06a30;--amber-deep:#8a4f22;--terra:#c0623a;
    --good:#3f6b49;--bad:#a23a2c;--warn:#9a5e1f;
    --r-s:12px;--r-m:20px;--r-l:28px;
    --serif:"Noto Serif SC","Songti SC","STSong",serif;
    --sans:"Noto Sans SC","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    --shadow:0 24px 64px rgba(74,44,18,.18);--shadow-soft:0 14px 36px rgba(74,44,18,.1);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;color:var(--ink);font-family:var(--sans);
    background:
      radial-gradient(circle at 12% 6%,rgba(255,251,242,.6) 0,transparent 30%),
      radial-gradient(circle at 88% 0%,rgba(120,78,38,.12) 0,transparent 26%),
      linear-gradient(180deg,#e9d6b6 0%,#dcc299 44%,#cba87c 100%);
    background-attachment:fixed;-webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;align-items:center;padding:22px 14px 40px;min-height:100%}

  .intro{max-width:880px;width:100%;margin-bottom:14px}
  .intro h1{font-family:var(--serif);font-weight:900;font-size:1.3rem;margin:0 0 6px}
  .intro p{margin:0;font-size:.82rem;color:var(--ink-soft);line-height:1.7}
  .guide{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;align-items:center}
  .guide .g{font-size:.72rem;padding:5px 11px;border-radius:999px;border:1px solid var(--line);background:rgba(255,250,242,.78);color:var(--amber-deep)}
  .guide .reset{margin-left:auto;font-size:.72rem;padding:6px 13px;border-radius:999px;border:1px solid var(--line-2);background:#fff7ec;color:var(--ink-soft);cursor:pointer}

  /* app shell */
  .app{position:relative;width:100%;max-width:880px;height:min(78vh,720px);display:flex;flex-direction:column;
    border-radius:var(--r-l);border:1px solid var(--line-2);background:var(--paper-card);box-shadow:var(--shadow);overflow:hidden}
  .topbar{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(255,250,242,.95),rgba(244,231,207,.82));z-index:4}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--serif);font-weight:700;font-size:.92rem}
  .brand .mk{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-size:.64rem;color:#fff;background:linear-gradient(160deg,var(--terra),var(--amber-deep))}
  .topbar .date{margin-left:auto;font-size:.74rem;color:var(--ink-faint)}

  /* today spine */
  .spine{display:flex;align-items:flex-start;padding:12px 10px 14px;border-bottom:1px solid var(--line);background:rgba(255,251,243,.5);z-index:3}
  .node{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;background:none;border:none;cursor:pointer;font-family:inherit}
  .node .seg-line{position:absolute;top:18px;left:-50%;width:100%;height:2px;background:var(--line);z-index:0}
  .node:first-child .seg-line{display:none}
  .node .glyph{position:relative;z-index:1;width:36px;height:36px;border-radius:50%;display:grid;place-items:center;
    font-family:var(--serif);font-weight:700;font-size:.96rem;background:var(--paper-card);border:1.5px solid var(--line-2);color:var(--ink-faint);transition:.2s}
  .node .cap{font-size:.62rem;color:var(--ink-faint)}
  .node:hover .glyph{transform:translateY(-1px)}
  .node.inprogress .glyph{border-color:var(--amber);color:var(--amber)}
  .node.draft .glyph{border-style:dashed;border-color:var(--amber);color:var(--amber)}
  .node.done .glyph{background:linear-gradient(160deg,#cf9a55,#a86f37);border-color:transparent;color:#fff;box-shadow:0 6px 14px rgba(150,95,40,.3)}
  .node.done .seg-line{background:linear-gradient(90deg,#cf9a55,#a86f37)}
  .node.done .cap{color:var(--amber-deep)}
  .node.selected .glyph{box-shadow:0 0 0 4px rgba(192,98,58,.16);border-color:var(--terra);color:var(--terra)}
  .node.selected.done .glyph{color:#fff;border-color:transparent;box-shadow:0 0 0 4px rgba(192,98,58,.2),0 6px 14px rgba(150,95,40,.3)}
  .node.selected .cap{color:var(--terra);font-weight:700}
  .node.harvest .glyph{font-size:.66rem;font-family:var(--sans);font-weight:700}
  .node.harvest.ready .glyph{background:linear-gradient(160deg,var(--terra),var(--amber-deep));color:#fff;border-color:transparent;animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,98,58,.34)}50%{box-shadow:0 0 0 8px rgba(192,98,58,0)}}

  /* stage */
  .stage{position:relative;flex:1;min-height:0;display:flex;flex-direction:column}

  /* chat */
  .chat{flex:1;min-height:0;overflow-y:auto;padding:16px 18px 8px;display:flex;flex-direction:column;gap:13px}
  .turn{display:flex;flex-direction:column;gap:4px;max-width:88%}
  .turn.u{align-self:flex-end;align-items:flex-end}
  .think{font-size:.72rem;color:var(--ink-faint);padding-left:4px;display:flex;gap:6px;align-items:center}
  .think::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--amber);flex:0 0 auto}
  .q{font-family:var(--serif);font-size:.95rem;line-height:1.65;padding:12px 16px;border-radius:16px 16px 16px 4px;
    background:linear-gradient(180deg,#fff6ea,#f4e3c6);border:1px solid var(--line);font-weight:500}
  .ub{font-size:.86rem;line-height:1.55;padding:11px 15px;border-radius:16px 16px 4px 16px;
    background:linear-gradient(180deg,#ddb985,#c39861);color:#2f2823;border:1px solid rgba(133,91,47,.2)}
  .empty{margin:auto;max-width:300px;text-align:center;color:var(--ink-faint);font-size:.82rem;line-height:1.7}
  .empty .em{font-family:var(--serif);font-size:1.05rem;color:var(--ink-soft);display:block;margin-bottom:6px}

  /* inline suggestion */
  .suggest{align-self:flex-start;max-width:88%;border:1px solid rgba(192,98,58,.28);background:rgba(255,247,242,.85);
    border-radius:14px;padding:10px 13px;font-size:.78rem;color:var(--ink-soft);display:flex;align-items:center;gap:10px}
  .suggest b{color:var(--terra)}
  .suggest button{flex:0 0 auto}

  /* composer */
  .composer-wrap{padding:10px 16px 14px;border-top:1px solid var(--line);background:rgba(255,251,243,.7)}
  .composer{display:flex;align-items:flex-end;gap:10px;padding:8px 8px 8px 14px;border-radius:16px;border:1px solid var(--line);background:#fff;transition:.2s}
  .composer.streaming{border-color:rgba(192,98,58,.4);background:rgba(255,247,242,.9)}
  .composer textarea{flex:1;border:none;outline:none;resize:none;background:none;font-family:inherit;font-size:.86rem;line-height:1.5;max-height:90px;color:var(--ink);padding:5px 0}
  .composer .send{height:34px;min-width:34px;border-radius:999px;border:none;display:grid;place-items:center;
    background:linear-gradient(160deg,#cf9a55,#a86f37);color:#fff;font-size:.74rem;padding:0 13px;cursor:pointer;transition:.15s}
  .composer .send:disabled{background:#e7d6bb;color:#9c8568;cursor:not-allowed}
  .composer .send.stop{background:#fff;color:var(--terra);border:1px solid var(--terra)}

  /* ribbon */
  .ribbon{position:absolute;right:0;top:14px;z-index:5;display:flex;align-items:center;gap:6px;
    padding:10px 13px 10px 15px;border-radius:12px 0 0 12px;font-size:.74rem;font-weight:700;color:#fff;cursor:pointer;border:none;
    background:linear-gradient(160deg,var(--terra),var(--amber-deep));box-shadow:-6px 8px 18px rgba(120,60,30,.26);transition:.18s}
  .ribbon:hover{padding-right:18px}
  .ribbon.pulse{animation:ribbonpulse 1.8s ease-in-out 3}
  @keyframes ribbonpulse{0%,100%{transform:translateX(0)}50%{transform:translateX(-4px)}}
  .ribbon.hidden{display:none}

  /* journal sheet */
  .scrim{position:absolute;inset:0;z-index:6;background:rgba(60,40,18,.32);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:.25s}
  .scrim.show{opacity:1;pointer-events:auto}
  .sheet{position:absolute;top:0;right:0;bottom:0;z-index:7;width:min(80%,520px);background:var(--paper-card);
    border-left:1px solid var(--line-2);box-shadow:-24px 0 60px rgba(74,44,18,.28);
    transform:translateX(102%);transition:transform .32s cubic-bezier(.3,.8,.3,1);display:flex;flex-direction:column;padding:18px 20px 16px}
  .sheet.open{transform:none}
  .shead{display:flex;align-items:center;gap:8px;margin-bottom:14px}
  .statepill{font-size:.68rem;font-weight:700;padding:5px 11px;border-radius:999px;border:1px solid var(--line);color:var(--ink-faint)}
  .statepill.saved{color:var(--good);background:rgba(63,107,73,.1);border-color:rgba(63,107,73,.3)}
  .statepill.draft{color:var(--warn);background:rgba(154,94,31,.1);border-color:rgba(154,94,31,.3)}
  .statepill.dirty{color:var(--terra);background:rgba(192,98,58,.1);border-color:rgba(192,98,58,.3)}
  .autos{margin-left:auto;font-size:.68rem;color:var(--ink-faint)}
  .sheet .x{width:28px;height:28px;border-radius:50%;border:1px solid var(--line);background:#fff;display:grid;place-items:center;font-size:.7rem;color:var(--ink-soft);cursor:pointer}
  .jtitle{font-family:var(--serif);font-weight:700;font-size:1.2rem;line-height:1.4;width:100%;border:none;outline:none;background:none;padding:4px 2px 10px;border-bottom:1px solid var(--line);color:var(--ink)}
  .jbody{font-family:var(--serif);font-size:.9rem;line-height:1.95;color:var(--ink-soft);width:100%;border:none;outline:none;background:none;resize:none;flex:1;padding:14px 2px;min-height:0}
  .sfoot{display:flex;gap:8px;justify-content:flex-end;align-items:center;border-top:1px solid var(--line);padding-top:12px}
  .sheet .genstate{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(--ink-faint);gap:12px}
  .sheet .genstate .spin{width:34px;height:34px;border-radius:50%;border:3px solid rgba(176,106,48,.25);border-top-color:var(--amber);animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* harvest view */
  .harvest{position:absolute;inset:0;z-index:5;background:var(--paper-card);display:flex;flex-direction:column;padding:18px;overflow-y:auto;transform:translateY(8px);opacity:0;pointer-events:none;transition:.25s}
  .harvest.show{transform:none;opacity:1;pointer-events:auto}
  .harvest .hhead{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .harvest .hhead .back{font-size:.74rem;border:1px solid var(--line);background:#fff7ec;border-radius:999px;padding:6px 12px;cursor:pointer;color:var(--ink-soft)}
  .harvest h2{font-family:var(--serif);font-weight:700;font-size:1.25rem;margin:8px 0 2px}
  .harvest .lead{font-size:.82rem;color:var(--ink-soft);line-height:1.7;margin:0 0 14px}
  .ingredients{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
  .ing{border:1px solid var(--line);border-radius:var(--r-s);padding:10px 6px;text-align:center;background:var(--paper-card)}
  .ing .gy{font-family:var(--serif);font-weight:700;font-size:1.15rem;display:block;margin-bottom:5px;color:var(--ink-faint)}
  .ing .st{font-size:.6rem;color:var(--ink-faint);line-height:1.3}
  .ing.saved{border-color:rgba(63,107,73,.34);background:rgba(63,107,73,.07)}
  .ing.saved .gy,.ing.saved .st{color:var(--good)}
  .ing.draft{border-color:rgba(154,94,31,.36);background:rgba(154,94,31,.07)}
  .ing.draft .gy,.ing.draft .st{color:var(--warn)}
  .ing.none{opacity:.55;border-style:dashed}
  .harvest-cta{display:flex;flex-direction:column;gap:11px;align-items:center;padding:20px;border-radius:var(--r-m);text-align:center;
    background:linear-gradient(170deg,rgba(255,250,242,.96),rgba(244,231,207,.9));border:1px solid var(--line)}
  .harvest-cta .ttl{font-family:var(--serif);font-size:1.1rem;font-weight:700}
  .harvest-cta .sub{font-size:.78rem;color:var(--ink-soft);line-height:1.6;max-width:400px}
  .auto-line{font-size:.7rem;color:var(--ink-faint)}
  .skip{margin-top:6px;width:100%;max-width:420px;padding:9px 12px;border-radius:10px;background:rgba(255,246,238,.85);border:1px dashed rgba(154,94,31,.34);font-size:.72rem;color:var(--warn);text-align:center}
  .harvest-result{margin-top:14px;border:1px solid rgba(63,107,73,.3);background:rgba(63,107,73,.06);border-radius:var(--r-m);padding:16px}
  .harvest-result .jt{font-family:var(--serif);font-weight:700;font-size:1.1rem;margin-bottom:8px}
  .harvest-result .jb{font-family:var(--serif);font-size:.86rem;line-height:1.9;color:var(--ink-soft)}
  .harvest-result .badge{display:inline-block;font-size:.66rem;font-weight:700;color:var(--good);background:rgba(63,107,73,.12);padding:4px 10px;border-radius:999px;margin-bottom:10px}

  /* buttons */
  .btn{font-size:.78rem;font-weight:600;padding:9px 16px;border-radius:999px;border:1px solid var(--line);background:#fff7ec;color:var(--ink-soft);cursor:pointer}
  .btn.pri{border:none;background:linear-gradient(160deg,#cf9a55,#a86f37);color:#fff;box-shadow:0 8px 18px rgba(150,95,40,.26)}
  .btn.terra{border:none;background:linear-gradient(160deg,var(--terra),var(--amber-deep));color:#fff;box-shadow:0 8px 18px rgba(150,60,30,.26)}
  .btn.ghost{background:none;border:none;color:var(--amber-deep);text-decoration:underline;text-underline-offset:3px;padding:9px 8px}
  .btn.big{font-size:.9rem;padding:13px 26px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* modal */
  .modal-scrim{position:fixed;inset:0;z-index:40;background:rgba(40,26,12,.5);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;padding:20px}
  .modal-scrim.show{display:flex}
  .modal{width:100%;max-width:420px;border-radius:var(--r-l);border:1px solid rgba(153,103,54,.18);
    background:linear-gradient(180deg,rgba(252,246,236,.99),rgba(238,221,193,.97));box-shadow:var(--shadow);padding:22px}
  .modal .eb{font-family:ui-monospace,monospace;font-size:.62rem;letter-spacing:.2em;color:#9a734d}
  .modal h3{font-family:var(--serif);margin:8px 0 10px;font-size:1.25rem}
  .modal p{margin:0;font-size:.84rem;line-height:1.7;color:#594537}
  .modal .mb{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}

  /* toast */
  .toast-host{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:50;display:flex;flex-direction:column;gap:8px;align-items:center;width:max-content;max-width:92vw}
  .toast{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:14px;background:#2c2114;color:#fbf0dc;font-size:.82rem;box-shadow:var(--shadow);animation:toastin .25s ease}
  @keyframes toastin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .toast .undo{color:#f2c98a;font-weight:700;text-decoration:underline;text-underline-offset:3px;cursor:pointer;white-space:nowrap}
</style>
</head>
<body>
  <div class="intro">
    <h1>记录链路 · 可交互原型</h1>
    <p>这是一个真正可点的流程演示，体现整套重构后的交互。试着：发一句话 → 等 AI 提问（可中断）→ 点右侧「日志」书签整理 → 编辑看保存状态 → 点书脊「完整」收成今天。</p>
    <div class="guide">
      <span class="g">① 发消息体验对话</span>
      <span class="g">② 点书签拉出日志</span>
      <span class="g">③ 书脊切维度</span>
      <span class="g">④ 完整 = 收成今天</span>
      <button class="reset" id="resetBtn">重置演示</button>
    </div>
  </div>

  <div class="app" id="app">
    <div class="topbar">
      <div class="brand"><span class="mk">DL</span>Daily Light</div>
      <span class="date">今天 · 6月12日</span>
    </div>
    <div class="spine" id="spine"></div>

    <div class="stage" id="stage">
      <button class="ribbon" id="ribbon">日志 ▸</button>
      <div class="chat" id="chat"></div>
      <div class="composer-wrap" id="composerWrap">
        <div class="composer" id="composer">
          <textarea id="input" rows="1" placeholder="说说今天……（回车发送，Shift+回车换行）"></textarea>
          <button class="send" id="sendBtn">发送</button>
        </div>
      </div>

      <!-- harvest overlay -->
      <div class="harvest" id="harvest"></div>

      <!-- journal sheet -->
      <div class="scrim" id="scrim"></div>
      <aside class="sheet" id="sheet"></aside>
    </div>
  </div>

  <!-- modal -->
  <div class="modal-scrim" id="modalScrim">
    <div class="modal" id="modal"></div>
  </div>

  <div class="toast-host" id="toastHost"></div>

<script>
const DIMS = [
  {key:'joy',glyph:'悦',name:'开心',
    opening:'今天有哪个小小的时刻，让你心里轻轻一动？',
    follows:['那一刻你正在做什么？','那份感觉里，最打动你的是哪一点？','如果只留一句话记住它，你会怎么写？'],
    jt:'清醒地开始',
    jb:'天还没亮透就醒了，脑子里没有平时那股黏糊。先把水烧上，趁等水的几分钟把今天要紧的事在心里过了一遍——那种「来得及」的从容，是今天最先尝到的甜。'},
  {key:'fulfillment',glyph:'实',name:'充实',
    opening:'今天有没有哪件事，让你觉得没白过？',
    follows:['具体是推进了什么？','它为什么让你觉得值得？','做完那一刻，你心里是什么感觉？'],
    jt:'把那块石头落了地',
    jb:'拖了三天的方案今天总算收了尾。不是做得多漂亮，而是终于不用再在心里挂着它。落地那一下，整个人都松了半寸。'},
  {key:'reflection',glyph:'思',name:'思考',
    opening:'今天有没有哪个瞬间，让你对什么有了新的看法？',
    follows:['是什么让你改变了原来的判断？','这个新理解，会怎么影响你接下来的选择？','它和你以前的想法差在哪？'],
    jt:'原来我一直看错了顺序',
    jb:'今天才意识到，我总把「准备好」当成开始的前提，其实是反过来的——先开始，才慢慢准备好。这个顺序一换，很多卡住的事好像都松动了。'},
  {key:'improvement',glyph:'改',name:'改进',
    opening:'今天有没有哪件事，你觉得下次可以做得不一样？',
    follows:['是哪个环节卡住了？','哪一小块是你下次能调整的？','下次最小的一步，会是什么？'],
    jt:'把节奏放慢半拍',
    jb:'今天又因为抢着回应而把话说急了。其实只要在开口前停半秒，先把对方那句听完，结果会完全不同。下次先深吸一口气再接话。'},
  {key:'gratitude',glyph:'谢',name:'感谢',
    opening:'今天有没有谁，让你心里觉得被接住了？',
    follows:['对方具体做了什么？','你的哪个需要被她看见了？','为什么这件事让你想记住它？'],
    jt:'被稳稳接住',
    jb:'最忙乱的时候，同事一句「这块我来，你先喘口气」，没多想就替我顶上了。被人这样不声不响接住的感觉，比解决问题本身更暖。'},
];

const HARVEST_TITLE = '六月十二日，从容的一天';
const HARVEST_BODY = '清晨的清醒像一把钥匙，替今天开了个好头。白天把拖了很久的方案落了地，心里那块石头总算松开；也在某个瞬间想通了「先开始才会准备好」的顺序。提醒自己说话再慢半拍，也记得被同事稳稳接住的那份暖。这一天不轰烈，却扎实。';

let state, autosaveTimer=null, streamTimer=null, toastTimer=null;

function freshState(){
  const convo={},journal={};
  DIMS.forEach(d=>{convo[d.key]={messages:[],started:false,askIndex:0,suggested:false};
    journal[d.key]={status:'none',title:'',content:'',dirty:false,savedAt:null};});
  return {current:'joy',convo,journal,view:'chat',sheetOpen:false,streaming:false,fullJournal:{status:'none'},generating:false};
}

const $=id=>document.getElementById(id);
const dimOf=k=>DIMS.find(d=>d.key===k);
function nowLabel(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

/* ---------- spine ---------- */
function nodeStateClass(k){
  const j=state.journal[k],c=state.convo[k];
  if(j.status==='saved')return'done';
  if(j.status==='draft')return'draft';
  if(c.started)return'inprogress';
  return'';
}
function renderSpine(){
  const sp=$('spine');sp.innerHTML='';
  DIMS.forEach(d=>{
    const b=document.createElement('button');
    b.className='node '+nodeStateClass(d.key)+(state.current===d.key&&state.view==='chat'?' selected':'');
    b.innerHTML=`<span class="seg-line"></span><span class="glyph">${d.glyph}</span><span class="cap">${capFor(d.key)}</span>`;
    b.onclick=()=>switchDim(d.key);
    sp.appendChild(b);
  });
  const anyMaterial=DIMS.some(d=>['draft','saved'].includes(state.journal[d.key].status));
  const h=document.createElement('button');
  h.className='node harvest'+(anyMaterial?' ready':'')+(state.view==='harvest'?' selected':'');
  const hcap=state.fullJournal.status==='saved'?'已收成':(anyMaterial?'待收成':'未就绪');
  h.innerHTML=`<span class="seg-line"></span><span class="glyph">完整</span><span class="cap">${hcap}</span>`;
  h.onclick=openHarvest;
  sp.appendChild(h);
}
function capFor(k){
  const j=state.journal[k],c=state.convo[k];
  if(j.status==='saved')return'已记';
  if(j.status==='draft')return'草稿';
  if(c.started)return'在聊';
  return'未开始';
}

/* ---------- chat ---------- */
function renderChat(){
  const c=$('chat');c.innerHTML='';
  const d=dimOf(state.current),conv=state.convo[state.current];
  if(conv.messages.length===0){
    c.innerHTML=`<div class="empty"><span class="em">${d.name}</span>${d.opening}</div>`;
    return;
  }
  conv.messages.forEach(m=>{
    if(m.role==='user'){
      c.insertAdjacentHTML('beforeend',`<div class="turn u"><div class="ub">${esc(m.text)}</div></div>`);
    }else{
      const think=m.think?`<div class="think">${esc(m.think)}</div>`:'';
      c.insertAdjacentHTML('beforeend',`<div class="turn">${think}<div class="q">${esc(m.text)||'&nbsp;'}</div></div>`);
    }
  });
  if(conv.suggested && !state.streaming){
    const s=document.createElement('div');s.className='suggest';
    s.innerHTML=`<span>这段已经够写成一篇<b>${d.name}</b>日志了。</span>`;
    const btn=document.createElement('button');btn.className='btn pri';btn.style.fontSize='.72rem';btn.style.padding='6px 12px';
    btn.textContent='整理成日志';btn.onclick=openSheet;
    s.appendChild(btn);c.appendChild(s);
  }
  c.scrollTop=c.scrollHeight;
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ---------- send / stream ---------- */
function updateComposer(){
  const btn=$('sendBtn'),comp=$('composer'),inp=$('input');
  if(state.streaming){
    comp.classList.add('streaming');btn.classList.add('stop');btn.textContent='停止';btn.disabled=false;
    inp.disabled=true;inp.placeholder='AI 正在回应你……';
  }else{
    comp.classList.remove('streaming');btn.classList.remove('stop');btn.textContent='发送';
    inp.disabled=false;inp.placeholder='说说今天……（回车发送，Shift+回车换行）';
    btn.disabled=!inp.value.trim();
  }
}
function sendMessage(){
  const inp=$('input');const text=inp.value.trim();if(!text||state.streaming)return;
  const conv=state.convo[state.current];
  conv.started=true;conv.messages.push({role:'user',text});
  inp.value='';inp.style.height='auto';
  renderChat();renderSpine();
  startReply();
  updateComposer();
}
function startReply(){
  const d=dimOf(state.current),conv=state.convo[state.current];
  state.streaming=true;updateComposer();
  const full=conv.messages.length<=1?d.opening:d.follows[Math.min(conv.askIndex,d.follows.length-1)];
  conv.askIndex++;
  const thinkLine='我读到的是：'+thinkSnippet(conv);
  const msg={role:'ai',think:'',text:''};
  conv.messages.push(msg);renderChat();
  // stream think then question
  let phase=0,i=0;
  clearInterval(streamTimer);
  streamTimer=setInterval(()=>{
    if(phase===0){
      msg.think=thinkLine.slice(0,i+1);i++;
      if(i>=thinkLine.length){phase=1;i=0;}
    }else{
      msg.text=full.slice(0,i+1);i++;
      if(i>=full.length){finishReply();return;}
    }
    renderChat();
  },28);
}
function thinkSnippet(conv){
  const last=[...conv.messages].reverse().find(m=>m.role==='user');
  const t=(last?last.text:'').slice(0,14);
  return t?`你说的「${t}${last.text.length>14?'…':''}」里那份在意`:'你此刻的状态';
}
function finishReply(){
  clearInterval(streamTimer);streamTimer=null;
  state.streaming=false;
  const conv=state.convo[state.current];
  const userTurns=conv.messages.filter(m=>m.role==='user').length;
  if(userTurns>=2)conv.suggested=true;
  renderChat();renderSpine();updateComposer();
  if(conv.suggested)pulseRibbon();
}
function stopReply(){
  if(!state.streaming)return;
  clearInterval(streamTimer);streamTimer=null;state.streaming=false;
  const conv=state.convo[state.current];
  const last=conv.messages[conv.messages.length-1];
  if(last&&last.role==='ai'&&!last.text){last.text='（已停止）';}
  renderChat();updateComposer();
}

/* ---------- dimension switch ---------- */
function switchDim(k){
  if(state.streaming)stopReply();
  if(state.sheetOpen)closeSheet(true);
  state.current=k;state.view='chat';
  hideHarvest();renderAll();
}

/* ---------- ribbon ---------- */
function pulseRibbon(){const r=$('ribbon');r.classList.remove('pulse');void r.offsetWidth;r.classList.add('pulse');}

/* ---------- journal sheet ---------- */
function openSheet(){
  if(state.view==='harvest')return;
  state.sheetOpen=true;
  $('scrim').classList.add('show');$('sheet').classList.add('open');
  const j=state.journal[state.current];
  if(j.status==='none'){generateDraft(false);}
  else renderSheet();
}
function closeSheet(silent){
  const j=state.journal[state.current];
  state.sheetOpen=false;
  $('scrim').classList.remove('show');$('sheet').classList.remove('open');
  if(autosaveTimer){clearTimeout(autosaveTimer);autosaveTimer=null;}
  if(j.dirty){j.dirty=false;j.savedAt=nowLabel();if(j.status!=='saved')j.status='draft';
    if(!silent)showToast('已帮你暂存这篇日志');}
  renderSpine();
}
function generateDraft(isRegen){
  const d=dimOf(state.current),j=state.journal[state.current];
  const prevHadDraft=j.status!=='none';
  const prev={title:j.title,content:j.content,status:j.status,savedAt:j.savedAt,dirty:j.dirty};
  state.generating=true;renderSheet();
  setTimeout(()=>{
    state.generating=false;
    j.title=d.jt;j.content=d.jb;j.status='draft';j.dirty=false;j.savedAt=nowLabel();
    renderSheet();renderSpine();
    if(isRegen&&prevHadDraft){
      showToast('已用最新对话重新整理这篇日志',()=>{
        Object.assign(j,prev);renderSheet();renderSpine();
      });
    }
  },900);
}
function renderSheet(){
  const sheet=$('sheet'),j=state.journal[state.current];
  if(state.generating){
    sheet.innerHTML=`<div class="shead"><span class="statepill">正在整理</span><span class="x" id="sx">✕</span></div>
      <div class="genstate"><div class="spin"></div><div>正在把这段对话整理成日志……</div></div>`;
    $('sx').onclick=()=>closeSheet();
    return;
  }
  const pill = j.status==='saved'&&!j.dirty?'<span class="statepill saved">已保存</span>'
    : j.dirty?'<span class="statepill dirty">有未保存修改</span>'
    : '<span class="statepill draft">草稿</span>';
  const autos = j.savedAt?`自动暂存于 ${j.savedAt}`:'';
  sheet.innerHTML=`
    <div class="shead">${pill}<span class="autos">${autos}</span><span class="x" id="sx">✕</span></div>
    <input class="jtitle" id="jtitle" value="${escAttr(j.title)}" placeholder="给这篇日志起个标题" />
    <textarea class="jbody" id="jbody" placeholder="日志正文……">${esc(j.content)}</textarea>
    <div class="sfoot">
      <button class="btn ghost" id="regenBtn">用最新对话重整</button>
      <button class="btn pri" id="saveBtn">${j.status==='saved'?'保存修改':'保存为正式日志'}</button>
    </div>`;
  $('sx').onclick=()=>closeSheet();
  $('regenBtn').onclick=()=>generateDraft(true);
  $('saveBtn').onclick=saveFinal;
  $('jtitle').oninput=e=>onJournalEdit('title',e.target.value);
  const tb=$('jbody');
  tb.oninput=e=>{onJournalEdit('content',e.target.value);autoGrow(tb);};
  autoGrow(tb);
}
function escAttr(s){return esc(s).replace(/"/g,'&quot;');}
function autoGrow(t){t.style.height='auto';t.style.height=Math.max(t.scrollHeight,120)+'px';}
function onJournalEdit(field,val){
  const j=state.journal[state.current];
  j[field==='title'?'title':'content']=val;j.dirty=true;
  // update pill live without full re-render (keep focus)
  const head=$('sheet').querySelector('.statepill');
  if(head){head.className='statepill dirty';head.textContent='有未保存修改';}
  if(autosaveTimer)clearTimeout(autosaveTimer);
  autosaveTimer=setTimeout(()=>{
    j.dirty=false;j.savedAt=nowLabel();if(j.status!=='saved')j.status='draft';
    const h=$('sheet').querySelector('.statepill');
    if(h){if(j.status==='saved'){h.className='statepill saved';h.textContent='已保存';}
      else{h.className='statepill draft';h.textContent='草稿';}}
    const a=$('sheet').querySelector('.autos');if(a)a.textContent=`自动暂存于 ${j.savedAt}`;
    renderSpine();
  },1100);
}
function saveFinal(){
  const j=state.journal[state.current],d=dimOf(state.current);
  showConfirm('保存确认','保存这篇日志','保存后这段「'+d.name+'」访谈会结束。你仍可随时打开日志继续改；想再聊需要新开一轮。','确定保存',()=>{
    if(autosaveTimer){clearTimeout(autosaveTimer);autosaveTimer=null;}
    j.status='saved';j.dirty=false;j.savedAt=nowLabel();
    renderSheet();renderSpine();
    showToast('已保存为正式日志');
  });
}

/* ---------- harvest ---------- */
function openHarvest(){
  if(state.streaming)stopReply();
  if(state.sheetOpen)closeSheet(true);
  state.view='harvest';renderSpine();renderHarvest();
  $('harvest').classList.add('show');$('ribbon').classList.add('hidden');
}
function hideHarvest(){$('harvest').classList.remove('show');$('ribbon').classList.remove('hidden');}
function backFromHarvest(){state.view='chat';hideHarvest();renderAll();}
function renderHarvest(){
  const h=$('harvest');
  const ings=DIMS.map(d=>{
    const s=state.journal[d.key].status;
    const cls=s==='saved'?'saved':s==='draft'?'draft':'none';
    const st=s==='saved'?'已记入':s==='draft'?'草稿·将自动保存':'未开始';
    return `<div class="ing ${cls}"><span class="gy">${d.glyph}</span><span class="st">${st}</span></div>`;
  }).join('');
  const drafts=DIMS.filter(d=>state.journal[d.key].status==='draft');
  const saved=DIMS.filter(d=>state.journal[d.key].status==='saved');
  const included=DIMS.filter(d=>['saved','draft'].includes(state.journal[d.key].status));
  const skipped=DIMS.filter(d=>state.journal[d.key].status==='none');
  const incNames=included.map(d=>d.name).join('、')||'（暂无）';
  const skipNames=skipped.map(d=>d.name).join('、');

  let ctaBlock;
  if(state.fullJournal.status==='saved'){
    ctaBlock=`<div class="harvest-result"><span class="badge">完整日志 · 已保存</span>
      <div class="jt">${HARVEST_TITLE}</div><div class="jb">${HARVEST_BODY}</div></div>`;
  }else if(included.length===0){
    ctaBlock=`<div class="harvest-cta"><div class="ttl">还没有可收成的内容</div>
      <div class="sub">先在某个维度里记一篇日志，今天就能收成完整日志。</div></div>`;
  }else{
    const draftNote=drafts.length?`，其中「${drafts.map(d=>d.name).join('、')}」还是草稿，将先帮你保存`:'';
    ctaBlock=`<div class="harvest-cta">
      <div class="ttl">把今天收成完整日志</div>
      <div class="sub">会把「${incNames}」收进来${draftNote}。</div>
      <button class="btn terra big" id="harvestBtn">收成今天</button>
      <div class="auto-line">自动：保存草稿维度 → 汇编完整日志 → 保存完整日志</div>
      ${skipped.length?`<div class="skip">⚐ 跳过「${skipNames}」：今天还没开始记，可稍后补</div>`:''}
    </div>`;
  }
  h.innerHTML=`
    <div class="hhead"><button class="back" id="harvestBack">‹ 返回对话</button></div>
    <h2>把今天收成</h2>
    <p class="lead">完整日志只汇总你今天的维度日志。下面是当前的素材状态：</p>
    <div class="ingredients">${ings}</div>
    ${ctaBlock}`;
  $('harvestBack').onclick=backFromHarvest;
  const hb=$('harvestBtn');if(hb)hb.onclick=runHarvest;
}
function runHarvest(){
  const hb=$('harvestBtn');if(hb){hb.disabled=true;hb.textContent='正在收成…';}
  // step 1: auto-save drafts
  setTimeout(()=>{
    DIMS.forEach(d=>{if(state.journal[d.key].status==='draft'){state.journal[d.key].status='saved';state.journal[d.key].dirty=false;}});
    renderSpine();
    // step 2+3: compose + save full journal
    setTimeout(()=>{
      state.fullJournal.status='saved';
      renderSpine();renderHarvest();
      showToast('今天已收成完整日志');
    },800);
  },700);
}

/* ---------- modal ---------- */
function showConfirm(eyebrow,title,desc,confirmLabel,onConfirm){
  const m=$('modal');
  m.innerHTML=`<div class="eb">${eyebrow}</div><h3>${title}</h3><p>${desc}</p>
    <div class="mb"><button class="btn" id="mCancel">继续访谈</button><button class="btn pri" id="mOk">${confirmLabel}</button></div>`;
  $('modalScrim').classList.add('show');
  $('mCancel').onclick=hideModal;
  $('mOk').onclick=()=>{hideModal();onConfirm();};
}
function hideModal(){$('modalScrim').classList.remove('show');}

/* ---------- toast ---------- */
function showToast(msg,undoFn){
  const host=$('toastHost');host.innerHTML='';
  const t=document.createElement('div');t.className='toast';
  t.innerHTML=`<span>${msg}</span>`;
  if(undoFn){const u=document.createElement('span');u.className='undo';u.textContent='撤销';
    u.onclick=()=>{clearTimeout(toastTimer);host.innerHTML='';undoFn();};t.appendChild(u);}
  host.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{host.innerHTML='';},undoFn?5000:2600);
}

/* ---------- render all ---------- */
function renderAll(){renderSpine();renderChat();updateComposer();}

/* ---------- wire ---------- */
function init(){
  state=freshState();
  hideHarvest();
  $('scrim').classList.remove('show');$('sheet').classList.remove('open');state.sheetOpen=false;
  $('ribbon').classList.remove('hidden');
  renderAll();
}
$('sendBtn').onclick=()=>{state.streaming?stopReply():sendMessage();};
$('ribbon').onclick=openSheet;
$('scrim').onclick=()=>closeSheet();
$('resetBtn').onclick=init;
$('input').addEventListener('input',e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,90)+'px';updateComposer();});
$('input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();sendMessage();}
});
init();
</script>
</body>
</html>
