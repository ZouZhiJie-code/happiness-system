<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>访谈页 · 今日发现原型（单日成长可视化）</title>
<style>
  :root {
    --paper-soft: #edd8b5;
    --paper-main: #f8e9cc;
    --paper-deep: #996534;
    --amber: #a96f3d;
    --amber-soft: rgba(169, 111, 61, 0.16);
    --line-soft: rgba(110, 73, 38, 0.16);
    --line-strong: rgba(110, 73, 38, 0.3);
    --ink: #2d241c;
    --ink-soft: #6a5440;
    --radius-control: 12px;
    --radius-card: 20px;
    --radius-shell: 28px;
    /* 今日之境：随发现累积变化的氛围强度，0~1 */
    --warmth: 0;
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; margin: 0; }

  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--ink);
    position: relative;
    overflow: hidden;
  }

  /* ── 今日之境：环境氛围层（不数数，被感受） ── */
  .ambient-base {
    position: fixed;
    inset: 0;
    z-index: -2;
    background: linear-gradient(180deg, #7c552f 0%, #a06f40 30%, #c79a63 64%, #ddb682 100%);
    transition: filter 1.2s ease;
    filter: saturate(calc(0.82 + var(--warmth) * 0.28)) brightness(calc(0.92 + var(--warmth) * 0.12));
  }
  .ambient-glow {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(255, 226, 168, calc(0.10 + var(--warmth) * 0.42)), transparent 60%),
      radial-gradient(90% 60% at 50% 120%, rgba(255, 213, 150, calc(0.04 + var(--warmth) * 0.22)), transparent 60%);
    transition: background 1.2s ease;
  }

  .stage {
    height: 100%;
    display: flex;
    flex-direction: column;
    max-width: 1180px;
    margin: 0 auto;
    padding: 18px 20px 14px;
  }

  /* ── 今日书脊：安静导航（不再是主角） ── */
  .spine {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: var(--radius-shell);
    background: linear-gradient(180deg, rgba(255, 250, 241, 0.78), rgba(244, 230, 204, 0.7));
    border: 1px solid var(--line-soft);
    box-shadow: 0 10px 30px rgba(90, 60, 30, 0.12);
  }
  .spine__label {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: #8a6b4b;
    white-space: nowrap;
    margin-right: 2px;
  }
  .spine__track { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .node {
    position: relative;
    width: 38px; height: 38px;
    display: grid; place-items: center;
    border-radius: 50%;
    font-family: "Songti SC", "Noto Serif SC", serif;
    font-size: 18px;
    color: #b39873;
    border: 1.5px solid var(--line-soft);
    background: rgba(255, 252, 245, 0.5);
    transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    flex-shrink: 0;
  }
  .node[data-state="active"] {
    color: var(--amber);
    border: 1.5px solid var(--amber);
    border-style: dashed;
    animation: breathe 2.4s ease-in-out infinite;
  }
  .node[data-state="done"] {
    color: #fff8ec;
    border: 1.5px solid transparent;
    background: linear-gradient(160deg, #b0823f, #83501f);
    box-shadow: 0 8px 18px rgba(131, 80, 31, 0.36);
    transform: rotate(-6deg);
  }
  .node[data-state="skip"] {
    color: #a89274;
    border-style: dotted;
    opacity: 0.7;
  }
  .node__stamp {
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    border: 2px solid rgba(255, 245, 224, 0.85);
    opacity: 0;
  }
  .node[data-state="done"] .node__stamp { animation: stampIn 0.5s ease forwards; }
  @keyframes stampIn {
    0% { opacity: 0; transform: scale(1.6) rotate(8deg); }
    60% { opacity: 1; }
    100% { opacity: 0.55; transform: scale(1) rotate(0); }
  }
  @keyframes breathe {
    0%, 100% { box-shadow: 0 0 0 0 rgba(169, 111, 61, 0.0); }
    50% { box-shadow: 0 0 0 5px rgba(169, 111, 61, 0.12); }
  }
  .spine__arrow { color: #b39873; font-size: 13px; }
  .node--final {
    width: 58px;
    border-radius: 16px;
    font-size: 14px;
    letter-spacing: 0.06em;
    color: #b39873;
  }
  .node--final[data-state="ready"] {
    color: #fff8ec;
    border: 1.5px solid transparent;
    background: linear-gradient(160deg, #caa15e, #9a6a2c);
    box-shadow: 0 0 0 0 rgba(255, 214, 140, 0.6);
    animation: ignite 1.8s ease-in-out infinite;
    transform: none;
  }
  @keyframes ignite {
    0%, 100% { box-shadow: 0 0 18px 1px rgba(255, 206, 130, 0.45); }
    50% { box-shadow: 0 0 30px 6px rgba(255, 206, 130, 0.75); }
  }

  /* ── 主体：左对话 + 右今日发现 ── */
  .body {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: 1.15fr 0.85fr;
    gap: 16px;
    margin-top: 14px;
  }
  @media (max-width: 860px) { .body { grid-template-columns: 1fr; } }

  .panel {
    border-radius: var(--radius-shell);
    background: linear-gradient(180deg, rgba(255, 250, 242, 0.9), rgba(246, 232, 206, 0.86));
    border: 1px solid var(--line-soft);
    box-shadow: 0 18px 44px rgba(90, 60, 30, 0.16);
    display: flex;
    flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }

  /* 对话区 */
  .chat { padding: 18px 18px 14px; }
  .chat__scroll { flex: 1; min-height: 0; overflow-y: auto; padding: 18px 18px 0; display: flex; flex-direction: column; gap: 14px; }
  .date-line { font-size: 12px; color: #8a6b4b; }
  .thinking { position: relative; padding-left: 16px; max-width: 80%; color: rgba(48, 33, 20, 0.5); font-size: 13px; line-height: 1.7; }
  .thinking::before { content: ""; position: absolute; left: 0; top: 9px; width: 6px; height: 6px; border-radius: 50%; background: rgba(169, 111, 61, 0.55); }
  .question {
    align-self: flex-start;
    max-width: 84%;
    padding: 12px 16px;
    border-radius: 22px;
    border: 1px solid rgba(166, 111, 59, 0.24);
    background: linear-gradient(180deg, rgba(255, 246, 234, 0.98), rgba(243, 226, 199, 0.96));
    font-size: 14px; line-height: 1.75; color: #2b2118; font-weight: 500;
  }
  .user {
    align-self: flex-end;
    max-width: 80%;
    padding: 11px 15px;
    border-radius: 22px;
    border: 1px solid rgba(133, 91, 47, 0.2);
    background: linear-gradient(180deg, rgba(221, 185, 133, 0.96), rgba(195, 152, 97, 0.96));
    font-size: 14px; line-height: 1.7; color: #2f2823;
  }
  .composer {
    margin: 12px 18px 4px;
    padding: 8px 10px 8px 16px;
    border-radius: 24px;
    border: 1px solid var(--line-soft);
    background: rgba(255, 250, 242, 0.7);
    display: flex; align-items: center; gap: 10px;
    color: #ab9886; font-size: 14px;
  }
  .composer__send { margin-left: auto; width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(180deg, #f4e1c7, #e5c9a9); border: 1px solid rgba(255,255,255,0.5); }

  /* 今日发现区（核心） */
  .discover { padding: 16px 16px 14px; }
  .discover__head { display: flex; align-items: baseline; justify-content: space-between; padding: 0 2px 12px; border-bottom: 1px solid var(--line-soft); }
  .discover__title { font-family: "Songti SC","Noto Serif SC", serif; font-size: 18px; color: var(--ink); }
  .discover__count { font-family: "Songti SC","Noto Serif SC", serif; }
  .discover__count b { font-size: 30px; color: var(--amber); }
  .discover__count span { font-size: 13px; color: #8a6b4b; margin-left: 2px; }
  .discover__list { flex: 1; min-height: 0; overflow-y: auto; padding: 14px 2px 4px; display: flex; flex-direction: column; gap: 12px; }
  .empty-hint { color: #9a7b56; font-size: 13px; line-height: 1.8; padding: 18px 8px; text-align: center; border: 1px dashed var(--line-soft); border-radius: var(--radius-card); background: rgba(255,249,239,0.4); }

  .card {
    position: relative;
    padding: 14px 15px 13px;
    border-radius: var(--radius-card);
    background: linear-gradient(180deg, rgba(255, 251, 243, 0.96), rgba(248, 236, 214, 0.94));
    border: 1px solid var(--line-soft);
    box-shadow: 0 8px 20px rgba(120, 80, 40, 0.1);
    animation: cardIn 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    transform-origin: top center;
  }
  @keyframes cardIn {
    0% { opacity: 0; transform: translateY(10px) rotateX(-12deg) scale(0.96); }
    100% { opacity: 1; transform: none; }
  }
  .card__tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: #8a6b4b; }
  .card__dot { width: 8px; height: 8px; border-radius: 50%; }
  .card__short { font-family: "Songti SC","Noto Serif SC", serif; font-size: 16px; color: var(--ink); margin: 7px 0 5px; }
  .card__line { font-size: 13.5px; line-height: 1.75; color: var(--ink-soft); }
  .card--skip { background: rgba(250, 244, 233, 0.7); border-style: dashed; }
  .card--skip .card__short { color: #8a7458; }

  /* 收成 */
  .harvest { margin: 4px 16px 12px; }
  .harvest__btn {
    width: 100%;
    padding: 13px;
    border-radius: 16px;
    border: 1px solid transparent;
    background: linear-gradient(160deg, #caa15e, #9a6a2c);
    color: #fff8ec;
    font-size: 15px; font-weight: 600; letter-spacing: 0.04em;
    cursor: pointer;
    box-shadow: 0 14px 30px rgba(131, 80, 31, 0.3);
    transition: transform 0.2s ease, opacity 0.3s ease;
  }
  .harvest__btn:hover { transform: translateY(-2px); }
  .harvest__btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.4); box-shadow: none; }
  .harvest__hint { text-align: center; font-size: 12px; color: #8a6b4b; margin-top: 7px; }

  .final-card {
    margin: 4px 16px 14px;
    padding: 18px;
    border-radius: var(--radius-card);
    border: 1px solid var(--line-strong);
    background: linear-gradient(180deg, rgba(255, 248, 235, 0.98), rgba(244, 226, 195, 0.96));
    box-shadow: 0 18px 40px rgba(120, 80, 40, 0.2);
    animation: cardIn 0.7s ease;
  }
  .final-card h3 { font-family: "Songti SC","Noto Serif SC", serif; margin: 0 0 8px; font-size: 20px; color: var(--ink); }
  .final-card p { margin: 0; font-size: 13.5px; line-height: 1.85; color: var(--ink-soft); }

  /* 原型操作台 */
  .console {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: var(--radius-card);
    border: 1px dashed var(--line-strong);
    background: rgba(40, 26, 16, 0.06);
  }
  .console__label { font-size: 11px; letter-spacing: 0.16em; color: #7c5a36; margin-bottom: 9px; }
  .console__row { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip {
    display: inline-flex; flex-direction: column; gap: 3px;
    border: 1px solid var(--line-soft);
    background: rgba(255, 250, 242, 0.85);
    border-radius: 12px;
    padding: 7px 11px;
    cursor: pointer;
    font-size: 12.5px; color: var(--ink);
    transition: all 0.2s ease;
  }
  .chip small { font-size: 10px; color: #9a7b56; }
  .chip:hover { border-color: var(--amber); transform: translateY(-1px); }
  .chip:disabled { opacity: 0.4; cursor: default; transform: none; }
  .chip--skip { color: #8a7458; }
  .reset { margin-left: auto; border: none; background: none; color: #9a7b56; text-decoration: underline; cursor: pointer; font-size: 12px; }

  .note { margin-top: 10px; font-size: 11.5px; line-height: 1.7; color: rgba(255,249,239,0.85); text-align: center; }
</style>
</head>
<body>
  <div class="ambient-base"></div>
  <div class="ambient-glow"></div>

  <div class="stage">
    <!-- 今日书脊：安静导航 -->
    <div class="spine">
      <span class="spine__label">今日</span>
      <div class="spine__track" id="spineTrack"></div>
      <span class="spine__arrow">→</span>
      <div class="node node--final" id="finalNode" data-state="idle">完整</div>
    </div>

    <div class="body">
      <!-- 对话区（支撑语境，静态） -->
      <section class="panel">
        <div class="chat"><span class="date-line">当前记录日期：2026-06-14</span></div>
        <div class="chat__scroll">
          <div class="thinking">我听到的是，你今天早上比平时早醒了一会儿，而且这件事让你感觉不太一样。</div>
          <div class="question">那段多出来的时间，你具体做了什么？当时心里是什么感觉？</div>
          <div class="user">就是慢慢喝了杯茶，没有立刻看手机，感觉一整天都没那么慌。</div>
          <div class="thinking">这种"慢下来开场"带来的稳，好像比事情本身更重要。</div>
        </div>
        <div class="composer">继续说说今天……<span class="composer__send"></span></div>
      </section>

      <!-- 今日发现：核心 -->
      <section class="panel">
        <div class="discover">
          <div class="discover__head">
            <div class="discover__title">今天你照见了自己</div>
            <div class="discover__count"><b id="count">0</b><span>件事</span></div>
          </div>
        </div>
        <div class="discover__list" id="discoverList">
          <div class="empty-hint" id="emptyHint">还没有发现。<br/>在左边聊聊今天的某一刻，记下一维，这里就会留下一句你照见自己的话。</div>
        </div>
        <div class="harvest" id="harvestZone" style="display:none;">
          <button class="harvest__btn" id="harvestBtn" disabled>收成今天</button>
          <div class="harvest__hint" id="harvestHint">再照见一件，就可以把今天收成一篇了</div>
        </div>
      </section>
    </div>

    <!-- 原型操作台 -->
    <div class="console">
      <div class="console__label">原型操作台（模拟"记下某一维" / "今天没有"）</div>
      <div class="console__row" id="consoleRow"></div>
      <div class="console__row" style="margin-top:8px;">
        <button class="reset" id="resetBtn">重置今天</button>
      </div>
    </div>
    <div class="note">纯单日 · 无连续打卡 · 无积分惩罚 ｜ 进度的货币是"你看见的自己"，不是"填满几个格子"</div>
  </div>

<script>
  const DIMS = [
    { key: "joy",         word: "悦", name: "开心", color: "#d9943f",
      short: "清醒地开始",  line: "你发现，早起多出来的那半小时，让你一整天都更稳。" },
    { key: "fulfillment", word: "实", name: "充实", color: "#b9893f",
      short: "总算落了地",  line: "你发现，那件拖了很久的事推进了一点，今天就没白过。" },
    { key: "reflection",  word: "思", name: "思考", color: "#7f9a55",
      short: "看重踏实",    line: "你发现，你其实更在意过程里的踏实，而不是结果好不好看。" },
    { key: "improvement", word: "改", name: "改进", color: "#5d96a8",
      short: "先听完再回应", line: "你发现，先听完再回应，会让一段对话顺很多。" },
    { key: "gratitude",   word: "谢", name: "感谢", color: "#a86fa0",
      short: "被稳稳接住",  line: "你发现，有人中午陪你走了一段，这件小事被你记住了。" },
  ];
  const SKIP_LINE = "你发现，今天这一维就是平平的 —— 这也成立，不必硬找。";

  const state = {}; // key -> "done" | "skip"
  DIMS.forEach(d => state[d.key] = null);

  const spineTrack = document.getElementById("spineTrack");
  const consoleRow = document.getElementById("consoleRow");
  const list = document.getElementById("discoverList");
  const emptyHint = document.getElementById("emptyHint");
  const countEl = document.getElementById("count");
  const finalNode = document.getElementById("finalNode");
  const harvestZone = document.getElementById("harvestZone");
  const harvestBtn = document.getElementById("harvestBtn");
  const harvestHint = document.getElementById("harvestHint");

  // 渲染书脊节点
  DIMS.forEach((d, i) => {
    const n = document.createElement("div");
    n.className = "node";
    n.id = "node-" + d.key;
    n.dataset.state = i === 0 ? "active" : "idle"; // 第一维示意"在聊"
    n.textContent = d.word;
    n.innerHTML += '<span class="node__stamp"></span>';
    spineTrack.appendChild(n);
  });

  // 渲染操作台
  DIMS.forEach(d => {
    const rec = document.createElement("button");
    rec.className = "chip";
    rec.id = "rec-" + d.key;
    rec.innerHTML = `记下「${d.name}」<small>盖章 + 一句发现</small>`;
    rec.onclick = () => record(d.key, "done");
    consoleRow.appendChild(rec);
  });
  DIMS.forEach(d => {
    const sk = document.createElement("button");
    sk.className = "chip chip--skip";
    sk.id = "skip-" + d.key;
    sk.innerHTML = `今天没有「${d.name}」<small>体面跳过</small>`;
    sk.onclick = () => record(d.key, "skip");
    consoleRow.appendChild(sk);
  });

  function discoveredCount() {
    return Object.values(state).filter(v => v === "done").length;
  }

  function record(key, kind) {
    if (state[key]) return;
    state[key] = kind;
    const d = DIMS.find(x => x.key === key);

    // 书脊节点状态
    const node = document.getElementById("node-" + key);
    node.dataset.state = kind === "done" ? "done" : "skip";

    // 下一未记维度示意"在聊"
    const nextIdle = DIMS.find(x => !state[x.key]);
    DIMS.forEach(x => {
      const nd = document.getElementById("node-" + x.key);
      if (!state[x.key]) nd.dataset.state = (nextIdle && x.key === nextIdle.key) ? "active" : "idle";
    });

    // 操作台禁用
    document.getElementById("rec-" + key).disabled = true;
    document.getElementById("skip-" + key).disabled = true;

    // 发现卡
    emptyHint.style.display = "none";
    const card = document.createElement("div");
    card.className = "card" + (kind === "skip" ? " card--skip" : "");
    if (kind === "done") {
      card.innerHTML = `
        <span class="card__tag"><span class="card__dot" style="background:${d.color}"></span>${d.name}</span>
        <div class="card__short">${d.short}</div>
        <div class="card__line">${d.line}</div>`;
    } else {
      card.innerHTML = `
        <span class="card__tag"><span class="card__dot" style="background:#cdbb9f"></span>${d.name}</span>
        <div class="card__short">今天就让它平平的</div>
        <div class="card__line">${SKIP_LINE}</div>`;
    }
    list.appendChild(card);
    list.scrollTop = list.scrollHeight;

    updateAmbient();
    updateCount();
    updateHarvest();
  }

  function updateCount() {
    countEl.textContent = discoveredCount();
  }

  function updateAmbient() {
    // 今日之境：氛围随"发现数"升温（被感受，不数数）
    const warmth = Math.min(discoveredCount() / 4, 1);
    document.documentElement.style.setProperty("--warmth", warmth.toFixed(2));
  }

  function updateHarvest() {
    const c = discoveredCount();
    if (c >= 1) harvestZone.style.display = "block";
    if (c >= 2) {
      finalNode.dataset.state = "ready";
      harvestBtn.disabled = false;
      harvestHint.textContent = `今天已照见 ${c} 件，可以收成了（也可以继续）`;
    } else {
      finalNode.dataset.state = "idle";
      harvestBtn.disabled = true;
      harvestHint.textContent = "再照见一件，就可以把今天收成一篇了";
    }
  }

  harvestBtn.onclick = () => {
    if (harvestBtn.disabled) return;
    const dones = DIMS.filter(d => state[d.key] === "done");
    document.documentElement.style.setProperty("--warmth", "1");
    harvestZone.innerHTML = "";
    const fc = document.createElement("div");
    fc.className = "final-card";
    fc.innerHTML = `
      <h3>今天的你</h3>
      <p>${dones.map(d => d.line.replace(/^你发现，/, "")).join(" ")}</p>
      <p style="margin-top:10px;color:#8a6b4b;font-size:12px;">— 由今天照见的 ${dones.length} 件事收成 ·（原型示意，正式版走完整日志生成）</p>`;
    harvestZone.parentNode.insertBefore(fc, harvestZone);
  };

  document.getElementById("resetBtn").onclick = () => location.reload();

  updateCount();
</script>
</body>
</html>
