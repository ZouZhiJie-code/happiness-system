<svg width="2200" height="1580" viewBox="0 0 2200 1580" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="60" x2="2040" y2="1500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF7EF"/>
      <stop offset="0.56" stop-color="#F4E5CF"/>
      <stop offset="1" stop-color="#EFD4B1"/>
    </linearGradient>
    <linearGradient id="hero" x1="220" y1="120" x2="1880" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5D402B"/>
      <stop offset="1" stop-color="#91684A"/>
    </linearGradient>
    <linearGradient id="cardWarm" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFF8F0"/>
      <stop offset="1" stop-color="#F8E7D1"/>
    </linearGradient>
    <linearGradient id="cardLight" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFDFC"/>
      <stop offset="1" stop-color="#F2E5D7"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F3F7EA"/>
      <stop offset="1" stop-color="#DDEBCB"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="2200" height="1580" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#8F6B4E" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="2200" height="1580" rx="48" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="110" y="74" width="1980" height="170" rx="38" fill="url(#hero)"/>
  </g>
  <text x="180" y="150" font-size="46" font-weight="700" fill="#FFF6EC">Happiness-system-codex 上线全流程</text>
  <text x="180" y="204" font-size="24" fill="#F9EAD8">从功能完善、工程硬化、部署上线，到中国正式可访问与备案的端到端路线图</text>
  <text x="1550" y="152" font-size="23" fill="#FFE8C3">推进顺序：先内测，再正式公开上线</text>
  <text x="1550" y="196" font-size="21" fill="#F5D8B4">周期参考：内测约 1 周，正式上线约 2-5 周</text>

  <g>
    <path d="M220 360 H1980" stroke="#C49A6C" stroke-width="6" stroke-linecap="round"/>
    <circle cx="260" cy="360" r="18" fill="#8E6549"/>
    <circle cx="520" cy="360" r="18" fill="#8E6549"/>
    <circle cx="780" cy="360" r="18" fill="#8E6549"/>
    <circle cx="1040" cy="360" r="18" fill="#8E6549"/>
    <circle cx="1300" cy="360" r="18" fill="#8E6549"/>
    <circle cx="1560" cy="360" r="18" fill="#8E6549"/>
    <circle cx="1820" cy="360" r="18" fill="#8E6549"/>
  </g>

  <g>
    <rect x="150" y="408" width="260" height="238" rx="28" fill="url(#cardWarm)" stroke="#D4B08B" stroke-width="3"/>
    <text x="180" y="456" font-size="30" font-weight="700" fill="#5C3D2A">01 定义首发边界</text>
    <text x="180" y="500" font-size="22" fill="#6D4D38">• 冻结首发功能范围</text>
    <text x="180" y="534" font-size="22" fill="#6D4D38">• 关闭 stub / 风险功能</text>
    <text x="180" y="568" font-size="22" fill="#6D4D38">• 确定先内测还是公开</text>
    <text x="180" y="602" font-size="22" fill="#6D4D38">• 输出首发清单</text>
  </g>

  <g>
    <rect x="420" y="408" width="260" height="238" rx="28" fill="url(#cardWarm)" stroke="#D4B08B" stroke-width="3"/>
    <text x="450" y="456" font-size="30" font-weight="700" fill="#5C3D2A">02 功能与体验收口</text>
    <text x="450" y="500" font-size="22" fill="#6D4D38">• 五维访谈人工冒烟</text>
    <text x="450" y="534" font-size="22" fill="#6D4D38">• 日志工作区不丢稿</text>
    <text x="450" y="568" font-size="22" fill="#6D4D38">• calendar / analysis 收口</text>
    <text x="450" y="602" font-size="22" fill="#6D4D38">• 清理占位文案</text>
  </g>

  <g>
    <rect x="690" y="408" width="260" height="238" rx="28" fill="url(#cardWarm)" stroke="#D4B08B" stroke-width="3"/>
    <text x="720" y="456" font-size="30" font-weight="700" fill="#5C3D2A">03 工程硬化</text>
    <text x="720" y="500" font-size="22" fill="#6D4D38">• typecheck / build / test</text>
    <text x="720" y="534" font-size="22" fill="#6D4D38">• 规范生产 migration</text>
    <text x="720" y="568" font-size="22" fill="#6D4D38">• 补 health / ready</text>
    <text x="720" y="602" font-size="22" fill="#6D4D38">• 补限流、监控、告警</text>
  </g>

  <g>
    <rect x="960" y="408" width="260" height="238" rx="28" fill="url(#cardWarm)" stroke="#D4B08B" stroke-width="3"/>
    <text x="990" y="456" font-size="30" font-weight="700" fill="#5C3D2A">04 部署架构准备</text>
    <text x="990" y="500" font-size="22" fill="#6D4D38">• 选内地或香港部署</text>
    <text x="990" y="534" font-size="22" fill="#6D4D38">• Node + Nginx + Postgres</text>
    <text x="990" y="568" font-size="22" fill="#6D4D38">• HTTPS、域名、SSE 配置</text>
    <text x="990" y="602" font-size="22" fill="#6D4D38">• 数据库备份与恢复</text>
  </g>

  <g>
    <rect x="1230" y="408" width="260" height="238" rx="28" fill="url(#cardGreen)" stroke="#AAC48A" stroke-width="3"/>
    <text x="1260" y="456" font-size="30" font-weight="700" fill="#3F5630">05 小范围内测上线</text>
    <text x="1260" y="500" font-size="22" fill="#4E6640">• 邀请制或内部账号</text>
    <text x="1260" y="534" font-size="22" fill="#4E6640">• 收真实用户反馈</text>
    <text x="1260" y="568" font-size="22" fill="#4E6640">• 观察错误与延迟</text>
    <text x="1260" y="602" font-size="22" fill="#4E6640">• 修一轮稳定性问题</text>
  </g>

  <g>
    <rect x="1500" y="408" width="260" height="238" rx="28" fill="url(#cardLight)" stroke="#CBB299" stroke-width="3"/>
    <text x="1530" y="456" font-size="30" font-weight="700" fill="#5C3D2A">06 正式上线准备</text>
    <text x="1530" y="500" font-size="22" fill="#6D4D38">• 买域名并实名认证</text>
    <text x="1530" y="534" font-size="22" fill="#6D4D38">• 开正式云资源</text>
    <text x="1530" y="568" font-size="22" fill="#6D4D38">• 法务文本正式化</text>
    <text x="1530" y="602" font-size="22" fill="#6D4D38">• 完成发布 runbook</text>
  </g>

  <g>
    <rect x="1770" y="408" width="260" height="238" rx="28" fill="url(#cardLight)" stroke="#CBB299" stroke-width="3"/>
    <text x="1800" y="456" font-size="30" font-weight="700" fill="#5C3D2A">07 备案与合规完成</text>
    <text x="1800" y="500" font-size="22" fill="#6D4D38">• ICP 备案</text>
    <text x="1800" y="534" font-size="22" fill="#6D4D38">• 公安联网备案</text>
    <text x="1800" y="568" font-size="22" fill="#6D4D38">• 页脚挂备案信息</text>
    <text x="1800" y="602" font-size="22" fill="#6D4D38">• 对外服务说明完整</text>
  </g>

  <path d="M1290 674 V760 H1820" stroke="#7B5A41" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="1810,748 1840,760 1810,772" fill="#7B5A41"/>
  <text x="1340" y="748" font-size="24" fill="#6D4D38">内测稳定后进入正式公开上线链路</text>

  <g>
    <rect x="160" y="818" width="570" height="300" rx="32" fill="#FFF9F1" stroke="#D7B590" stroke-width="3"/>
    <text x="198" y="874" font-size="34" font-weight="700" fill="#5A3B29">A. 本周要做</text>
    <text x="198" y="922" font-size="24" fill="#6D4D38">1) 冻结首发范围，关掉 stub 与高风险功能</text>
    <text x="198" y="960" font-size="24" fill="#6D4D38">2) 跑五维主链路人工回归，补日志工作区问题</text>
    <text x="198" y="998" font-size="24" fill="#6D4D38">3) 处理 typecheck/build/test 与环境变量治理</text>
    <text x="198" y="1036" font-size="24" fill="#6D4D38">4) 补 migration、health/ready、监控、限流</text>
    <text x="198" y="1074" font-size="24" fill="#6D4D38">5) 准备预发环境并完成一次完整 smoke test</text>
  </g>

  <g>
    <rect x="816" y="818" width="570" height="300" rx="32" fill="#FCF6EE" stroke="#D7B590" stroke-width="3"/>
    <text x="854" y="874" font-size="34" font-weight="700" fill="#5A3B29">B. 备案期并行做</text>
    <text x="854" y="922" font-size="24" fill="#6D4D38">1) 确定主体：长期运营优先企业主体</text>
    <text x="854" y="960" font-size="24" fill="#6D4D38">2) 域名实名认证、服务器与数据库开通</text>
    <text x="854" y="998" font-size="24" fill="#6D4D38">3) 完成正式《用户协议》《隐私政策》</text>
    <text x="854" y="1036" font-size="24" fill="#6D4D38">4) 提交 ICP 备案，随后做公安联网备案</text>
    <text x="854" y="1074" font-size="24" fill="#6D4D38">5) 准备页脚备案展示和对外服务说明</text>
  </g>

  <g>
    <rect x="1472" y="818" width="570" height="300" rx="32" fill="#F3F8EC" stroke="#B3C996" stroke-width="3"/>
    <text x="1510" y="874" font-size="34" font-weight="700" fill="#435A33">C. 上线前一天与当天</text>
    <text x="1510" y="922" font-size="24" fill="#536A43">1) 冻结代码，创建数据库备份点</text>
    <text x="1510" y="960" font-size="24" fill="#536A43">2) 预发全链路回归，检查 HTTPS 和监控</text>
    <text x="1510" y="998" font-size="24" fill="#536A43">3) 正式环境执行迁移与发布</text>
    <text x="1510" y="1036" font-size="24" fill="#536A43">4) 小流量灰度，观察 AI 失败率与错误日志</text>
    <text x="1510" y="1074" font-size="24" fill="#536A43">5) 上线后 48 小时持续值守</text>
  </g>

  <g>
    <rect x="144" y="1194" width="1910" height="236" rx="34" fill="#FFF7EE" stroke="#D2AF88" stroke-width="3"/>
    <text x="198" y="1262" font-size="36" font-weight="700" fill="#5A3B29">最终发布门槛</text>
    <text x="198" y="1314" font-size="26" fill="#6B4C37">• 核心闭环稳定：注册/登录 -> 访谈 -> 生成日志 -> 编辑保存 -> 回看</text>
    <text x="198" y="1356" font-size="26" fill="#6B4C37">• 工程可发布：构建、迁移、回滚、监控、备份、错误定位都跑通</text>
    <text x="198" y="1398" font-size="26" fill="#6B4C37">• 中国可访问：正式域名、HTTPS、内地部署或明确的内测方案、备案链路完成</text>
  </g>
</svg>
