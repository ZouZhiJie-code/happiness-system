<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF9F2"/>
      <stop offset="100%" stop-color="#F5EFE5"/>
    </linearGradient>
    <linearGradient id="titleGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6D8AE" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#D7B28A" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="stageHeader" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5C4532"/>
      <stop offset="100%" stop-color="#7A5A41"/>
    </linearGradient>
    <linearGradient id="roleHeader" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B5A42"/>
      <stop offset="100%" stop-color="#8D6A4D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#5C4634" flood-opacity="0.16"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#5C4634" flood-opacity="0.12"/>
