<svg width="2200" height="1420" viewBox="0 0 2200 1420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="100" y1="40" x2="2100" y2="1380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF8F1"/>
      <stop offset="0.58" stop-color="#F2E4D3"/>
      <stop offset="1" stop-color="#E8D0B3"/>
    </linearGradient>
    <linearGradient id="hero" x1="120" y1="72" x2="2060" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5A3E2C"/>
      <stop offset="1" stop-color="#8B6446"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="2200" height="1420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#89664A" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="2200" height="1420" rx="44" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="110" y="72" width="1980" height="148" rx="34" fill="url(#hero)"/>
  </g>
  <text x="170" y="138" font-size="44" font-weight="700" fill="#FFF5EB">并行推进版：产品、部署、备案三条主线</text>
  <text x="170" y="186" font-size="23" fill="#F7E4CF">核心原则：功能完善、部署准备、备案与法务不要串行做，应并行推进并在关键节点汇合</text>

  <g>
    <rect x="120" y="272" width="420" height="78" rx="20" fill="#F8EBDB" stroke="#D1AE8A" stroke-width="3"/>
    <text x="150" y="321" font-size="30" font-weight="700" fill="#5C3E2A">主线 / 周次</text>

    <rect x="570" y="272" width="250" height="78" rx="20" fill="#FFF7ED" stroke="#D1AE8A" stroke-width="3"/>
    <text x="660" y="321" font-size="30" font-weight="700" fill="#5C3E2A">第 1 周</text>

    <rect x="850" y="272" width="250" height="78" rx="20" fill="#FFF7ED" stroke="#D1AE8A" stroke-width="3"/>
    <text x="940" y="321" font-size="30" font-weight="700" fill="#5C3E2A">第 2 周</text>

    <rect x="1130" y="272" width="250" height="78" rx="20" fill="#FFF7ED" stroke="#D1AE8A" stroke-width="3"/>
    <text x="1220" y="321" font-size="30" font-weight="700" fill="#5C3E2A">第 3 周</text>

    <rect x="1410" y="272" width="250" height="78" rx="20" fill="#FFF7ED" stroke="#D1AE8A" stroke-width="3"/>
    <text x="1500" y="321" font-size="30" font-weight="700" fill="#5C3E2A">第 4 周</text>

    <rect x="1690" y="272" width="250" height="78" rx="20" fill="#FFF7ED" stroke="#D1AE8A" stroke-width="3"/>
    <text x="1780" y="321" font-size="30" font-weight="700" fill="#5C3E2A">第 5 周+</text>
  </g>

  <g>
    <rect x="120" y="390" width="420" height="208" rx="28" fill="#FFF8F0" stroke="#D2AF89" stroke-width="3"/>
    <text x="154" y="442" font-size="34" font-weight="700" fill="#5B3D2A">产品与工程线</text>
    <text x="154" y="488" font-size="24" fill="#6C4B36">目标：功能稳定、主链路完成、工程可发布</text>
    <text x="154" y="528" font-size="22" fill="#6C4B36">范围：功能收口、测试、迁移、限流、监控</text>

    <rect x="570" y="416" width="530" height="58" rx="18" fill="#C88E57"/>
    <text x="596" y="453" font-size="24" font-weight="700" fill="#FFF9F1">首发范围冻结 + 五维主链路回归 + 关掉 stub</text>

    <rect x="570" y="494" width="810" height="58" rx="18" fill="#B77846"/>
    <text x="596" y="531" font-size="24" font-weight="700" fill="#FFF9F1">修日志工作区 / calendar / analysis 问题 + 跑 typecheck/build/test</text>

    <rect x="850" y="572" width="810" height="58" rx="18" fill="#A8613B"/>
    <text x="876" y="609" font-size="24" font-weight="700" fill="#FFF9F1">补 migration、health/ready、监控告警、rate limit，完成预发回归</text>
  </g>

  <g>
    <rect x="120" y="656" width="420" height="208" rx="28" fill="#F8FBF3" stroke="#AFC993" stroke-width="3"/>
    <text x="154" y="708" font-size="34" font-weight="700" fill="#425932">部署与基础设施线</text>
    <text x="154" y="754" font-size="24" fill="#536A43">目标：真实域名可访问，服务与数据库稳定运行</text>
    <text x="154" y="794" font-size="22" fill="#536A43">范围：域名、服务器、DB、HTTPS、预发与发布</text>

    <rect x="570" y="682" width="530" height="58" rx="18" fill="#8EB46D"/>
    <text x="596" y="719" font-size="24" font-weight="700" fill="#F6FFF1">买域名、开云资源、定 Node + Nginx + Postgres 方案</text>

    <rect x="850" y="760" width="530" height="58" rx="18" fill="#77A15A"/>
    <text x="876" y="797" font-size="24" font-weight="700" fill="#F6FFF1">配置 HTTPS、环境变量、预发环境，做首次部署演练</text>

    <rect x="1130" y="838" width="530" height="58" rx="18" fill="#628B49"/>
    <text x="1156" y="875" font-size="24" font-weight="700" fill="#F6FFF1">完善备份恢复与正式发布 runbook，准备灰度与切流</text>
  </g>

  <g>
    <rect x="120" y="922" width="420" height="208" rx="28" fill="#F7F1FB" stroke="#C4A5DD" stroke-width="3"/>
    <text x="154" y="974" font-size="34" font-weight="700" fill="#5E3F7A">合规与备案线</text>
    <text x="154" y="1020" font-size="24" fill="#705286">目标：中国正式公开上线条件齐备</text>
    <text x="154" y="1060" font-size="22" fill="#705286">范围：主体、法务文本、ICP、公安备案</text>

    <rect x="570" y="948" width="530" height="58" rx="18" fill="#A176C0"/>
    <text x="596" y="985" font-size="24" font-weight="700" fill="#FFF7FF">确定主体 + 法务文本定稿 + 备案材料整理</text>

    <rect x="850" y="1026" width="530" height="58" rx="18" fill="#8F63B2"/>
    <text x="876" y="1063" font-size="24" font-weight="700" fill="#FFF7FF">域名实名完成后提交 ICP，审核期间继续做产品与部署</text>

    <rect x="1410" y="1104" width="530" height="58" rx="18" fill="#7C52A1"/>
    <text x="1436" y="1141" font-size="24" font-weight="700" fill="#FFF7FF">ICP 后做公安备案，挂备案信息，准备正式公开发布</text>
  </g>

  <g>
    <path d="M1660 601 C1810 601 1810 770 1660 770" stroke="#7A5A42" stroke-width="5" fill="none" stroke-linecap="round"/>
    <polygon points="1652,756 1686,770 1652,784" fill="#7A5A42"/>
    <text x="1714" y="690" font-size="22" fill="#6C4C38">产品线稳定后</text>
    <text x="1714" y="722" font-size="22" fill="#6C4C38">进入部署灰度</text>
  </g>

  <g>
    <path d="M1660 864 C1810 864 1810 1033 1660 1033" stroke="#7A5A42" stroke-width="5" fill="none" stroke-linecap="round"/>
    <polygon points="1652,1019 1686,1033 1652,1047" fill="#7A5A42"/>
    <text x="1714" y="952" font-size="22" fill="#6C4C38">云资源与域名就绪后</text>
    <text x="1714" y="984" font-size="22" fill="#6C4C38">备案线全面推进</text>
  </g>

  <g>
    <rect x="120" y="1186" width="1820" height="164" rx="30" fill="#FFF8F0" stroke="#D2AF89" stroke-width="3"/>
    <text x="162" y="1242" font-size="34" font-weight="700" fill="#5B3D2A">关键结论</text>
    <text x="162" y="1290" font-size="25" fill="#6C4B36">1) 第 1 周最适合三线并行启动，避免把备案等待期浪费掉。</text>
    <text x="162" y="1328" font-size="25" fill="#6C4B36">2) 真正拖慢总周期的通常是备案审核时间，以及上线前才暴露出的稳定性与回滚问题。</text>
  </g>
</svg>
